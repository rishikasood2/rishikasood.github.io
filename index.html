  <style>
    @font-face {
      font-family: 'iAWriterDuospace';
      src: url('iAWriterDuospace-Regular.otf') format('opentype');

      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: white; overflow: hidden; font-family: 'iAWriterDuospace', monospace; }
    .nav { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 18px 24px; z-index: 10; }
    .nav a { text-decoration: none; font-size: 1rem; letter-spacing: 0.05em; color: #000; }
    .center-line { position: absolute; background-color: #000; pointer-events: none; }
    .center-line-x { width: 93vw; height: 1px; left: 50vw; top: 50vh; transform: translate(-50%, -50%); }
    .center-line-y { width: 1px; height: 89vh; top: 50vh; left: 50vw; transform: translateY(-50%); }
    .center-text-x { position: fixed; top: 1.7vh; left: 50%; transform: translateX(-50%); font-size: 1rem; letter-spacing: 0.05em; }
    .center-text-x2 { position: fixed; bottom: 3vh; left: 50%; transform: translateX(-50%); font-size: 1rem; letter-spacing: 0.05em; }
    .center-text-y { position: absolute; top: 47.5vh; left: 3.5vh; transform: translate(-50%) rotate(-90deg); background-color: white; border-bottom: 17px solid #ffffff; font-size: 1rem; letter-spacing: 0.05em; }
    .center-text-y2 { position: absolute; top: 48vh; right: 3.9vh; transform: translate(50%) rotate(90deg); background-color: #ffffff; border-bottom: 17px solid #ffffff; font-size: 1rem; letter-spacing: 0.05em; }
    .dot { position: absolute; width: 12px; height: 12px; background-color: rgba(0,0,0,0); border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); z-index: 2; display: flex; flex-direction: row; align-items: center; }
    .dot a { display: flex; align-items: center; text-decoration: none; }
    .dot-circle { display: block; width: 12px; height: 12px; flex-shrink: 0; background-color: #999; border-radius: 50%; transition: background-color 0.2s ease; }
    .dot-label { margin-left: 5px; font-size: 0.8rem; color: #999; text-align: left; white-space: nowrap; pointer-events: none; transition: color 0.2s ease; }
    .hover-title:hover .dot-circle { background-color: #000; }
    .hover-title:hover .dot-label { color: #000; }
    .tilt-image { width: 220px; height: auto; transform-origin: bottom center; animation: none; }
    .tilt-image-small { width: 180px; height: auto; transform-origin: bottom center; animation: none; }
    .hover-title:hover .tilt-image { animation: tilt-loop 0.5s ease-in-out infinite; }
    .hover-title:hover .tilt-image-small { animation: tilt-loop 0.5s ease-in-out infinite; }
    @keyframes tilt-loop {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(-10deg); }
      50%  { transform: rotate(0deg); }
      75%  { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>
